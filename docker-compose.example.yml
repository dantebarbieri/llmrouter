# Example docker-compose for running llmrouter alongside LiteLLM and Ollama.
# Assumes you already have LiteLLM + Ollama running elsewhere; adjust URLs.
services:
  llmrouter:
    image: ghcr.io/dantebarbieri/llmrouter:latest
    container_name: llmrouter
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      LITELLM_BASE_URL: http://litellm:4000/v1
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      ROUTER_API_KEY: ${ROUTER_API_KEY}
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      NTFY_URL: ${NTFY_URL:-}
      NTFY_TOPIC: ${NTFY_TOPIC:-llmrouter}
      LLMROUTER_CONFIG: /etc/llmrouter/config.yaml
      LLMROUTER_DB_PATH: /data/llmrouter.db
      LOG_LEVEL: info
    volumes:
      # Mount your own config; remove this line to use packaged defaults.
      - ./config.yaml:/etc/llmrouter/config.yaml:ro
      # Persist the request log across container restarts.
      - llmrouter-data:/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  llmrouter-data:
