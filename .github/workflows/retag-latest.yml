name: retag-latest

# Manually point ghcr.io/.../llmrouter:latest at an existing semver tag.
# Useful when you've pulled a bad release and want :latest to revert to
# the previous stable, without rebuilding. Refuses to point :latest at
# preview tags.

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: "Existing image tag to point :latest at (e.g. 0.1.0). Must NOT start with 'pr-' or 'preview-'."
        required: true
        default: "0.1.0"

permissions:
  contents: read
  packages: write

jobs:
  retag:
    runs-on: ubuntu-latest
    steps:
      - name: Validate input
        run: |
          set -euo pipefail
          SRC="${{ github.event.inputs.source_tag }}"
          case "$SRC" in
            pr-*|preview-*|latest|"")
              echo "::error::Refusing to use '$SRC' as the source for :latest."
              exit 1
              ;;
          esac
          echo "source_tag=$SRC ok"

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag :latest -> ${{ github.event.inputs.source_tag }}
        run: |
          set -euo pipefail
          IMG="ghcr.io/${{ github.repository }}"
          docker buildx imagetools create \
            -t "$IMG:latest" \
            "$IMG:${{ github.event.inputs.source_tag }}"
          echo "Done. :latest now points at $IMG:${{ github.event.inputs.source_tag }}"
