name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  guard:
    # Only release tags whose commit is reachable from origin/main.
    # This prevents pushing a tag from a feature branch and shipping an
    # unmerged commit to ghcr.io / :latest.
    runs-on: ubuntu-latest
    outputs:
      on_main: ${{ steps.check.outputs.on_main }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Verify tag commit is on main
        id: check
        run: |
          set -euo pipefail
          TAG_SHA="${GITHUB_SHA}"
          git fetch origin main --depth=200
          if git merge-base --is-ancestor "$TAG_SHA" origin/main; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
            echo "Tag commit $TAG_SHA is reachable from origin/main — proceeding."
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
            echo "::error::Tag commit $TAG_SHA is NOT on origin/main. Refusing to release."
            echo "Tags must be pushed only from main (after PR merge)."
            exit 1
          fi

  build-and-push:
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
